# Kassandra documentation — build, validate, and PUBLISH via GitHub Actions.
#
# HOW PUBLISHING WORKS
# --------------------
# On every push to `master`, this workflow builds the Mintlify docs into a static site
# (`mint export`), rewrites the export's root-absolute URLs to the GitHub Pages base path,
# and deploys it to GitHub Pages. The publish is performed BY THIS WORKFLOW — no external
# hosted service. Pull requests build + validate only (they do not deploy).
#
# ONE-TIME SETUP (human, done once — see docs-site/README.md and /ops/docs-site):
#   Settings → Pages → "Build and deployment" → Source: **GitHub Actions**.
# Optional — a custom domain: add `docs-site/CNAME` containing your domain (e.g.
# docs.kassandra.xyz) and set it under Settings → Pages. With a custom domain the site is
# served from the domain root, so the base-path rewrite becomes a no-op and client-side
# navigation is pixel-perfect. Without one, the site is served at
# https://<owner>.github.io/<repo>/ and the rewrite makes every page resolve.
#
# ALTERNATIVE: prefer Mintlify's hosted platform? Connect the repo at
# dashboard.mintlify.com (content dir `docs-site`, branch `master`) and this workflow can be
# reduced to the validation steps. See /ops/docs-site.

name: Docs

on:
  push:
    branches: [master]
    paths:
      - "docs-site/**"
      - ".github/workflows/docs.yml"
  pull_request:
    paths:
      - "docs-site/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: docs-pages
  cancel-in-progress: false

jobs:
  build:
    name: Build & validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs-site
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Mintlify CLI
        run: npm install -g mint

      - name: Check docs.json is valid JSON
        run: node -e "JSON.parse(require('fs').readFileSync('docs.json','utf8')); console.log('docs.json is valid JSON')"

      - name: Validate build (strict)
        run: mint validate

      - name: Check for broken links
        run: mint broken-links

      - name: Export static site
        run: |
          mint export --output export.zip
          rm -rf _site
          unzip -q export.zip -d _site

      - name: Rewrite base path + finalize
        run: |
          if [ -f CNAME ]; then
            BASE=""
            cp CNAME _site/CNAME
            echo "custom domain detected — serving from root"
          else
            BASE="/${GITHUB_REPOSITORY#*/}"
            echo "no CNAME — serving at project sub-path $BASE"
          fi
          node scripts/rewrite-base-path.mjs _site "$BASE"
          touch _site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs-site/_site

  deploy:
    name: Deploy to GitHub Pages
    # Publish only from master; PRs build + validate above but never deploy.
    if: github.ref == 'refs/heads/master'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
