# Kassandra documentation — CI validation + publish gate.
#
# HOW PUBLISHING WORKS
# --------------------
# Mintlify hosts the docs. Publishing on push to `master` is performed by the
# **Mintlify GitHub App**, which auto-deploys the `docs-site/` project whenever a
# commit lands on the deployment branch. This workflow is the CI gate that runs on
# every push to `master` (and on pull requests): it validates the Mintlify config
# and checks for broken links so a bad commit never reaches the live site.
#
# ONE-TIME SETUP (human, done once — see docs-site/README.md and /ops/docs-site):
#   1. Go to https://dashboard.mintlify.com and sign in with GitHub.
#   2. Connect the `Dodecahedr0x/kassandra` repository.
#   3. Set the content directory to `docs-site` and the deployment branch to `master`.
#   4. Install the Mintlify GitHub App when prompted.
# After that, every push to `master` auto-deploys, and this workflow guards it.

name: Docs

on:
  push:
    branches: [master]
    paths:
      - "docs-site/**"
      - ".github/workflows/docs.yml"
  pull_request:
    paths:
      - "docs-site/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate docs
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs-site
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Mintlify CLI
        run: npm install -g mint

      - name: Check docs.json is valid JSON
        run: node -e "JSON.parse(require('fs').readFileSync('docs.json','utf8')); console.log('docs.json is valid JSON')"

      - name: Validate build (strict)
        run: mint validate

      - name: Check for broken links
        run: mint broken-links
