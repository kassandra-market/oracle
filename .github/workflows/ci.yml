# Kassandra CI — run the full test suite on every pull request (and on master).
#
# Lanes (all triggered on PRs):
#   build      — compile the SBF program (.so) ONCE and share it as an artifact.
#                Every downstream lane's tests load this exact .so
#                (`target/deploy/kassandra_program.so`): the Rust program tests
#                `include_bytes!` it at compile time; the SDK litesvm + surfpool
#                harnesses load it at runtime.
#   rust       — `cargo test --workspace` (program LiteSVM tests + runner + sdk-rs).
#   js         — build the SDK (the app consumes its dist/), then typecheck + lint
#                + every vitest suite for sdk & app. The sdk litesvm suites need the
#                shared .so; surfpool-gated suites self-skip (`describe.skipIf`).
#   runner-e2e — build the REAL `kassandra-runner` binary and drive its full
#                provider pipeline against a LOCAL MOCK Anthropic server (no API
#                key, no network): the mock's chosen option flows through the real
#                HTTP+parse path and the runner emits a genuine 97-byte AI-claim
#                payload (plus a refusal arm). Deterministic and offline.
#   e2e        — boot a local surfpool validator + run the non-forked Playwright
#                browser suite (write/crank/claim/settle/admin flows against the
#                real program).
#
# The mainnet-FORKED Playwright project (playwright.fork.config.ts) and the
# network-dependent SDK surfpool suites are intentionally NOT run here — they need
# live mainnet RPC and are flaky on hosted runners; run them locally via
# scripts/e2e-playwright-fork.sh / `pnpm --filter ./sdk test:e2e`.

name: CI

on:
  pull_request:
  push:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # Pin the Anza (Agave) toolchain that builds the SBF program locally, for a
  # reproducible `cargo build-sbf`.
  SOLANA_VERSION: v3.1.7

jobs:
  build:
    name: Build · SBF program (.so)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2

      - name: Cache Solana toolchain
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/share/solana
            ~/.cache/solana
          key: solana-${{ env.SOLANA_VERSION }}-${{ runner.os }}

      - name: Install Solana (Anza) toolchain
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/${SOLANA_VERSION}/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"

      - name: Build SBF programs (.so) — oracle + market
        run: |
          cargo build-sbf --manifest-path programs/kassandra/Cargo.toml
          cargo build-sbf --manifest-path programs/kassandra-market/Cargo.toml

      - name: Upload program artifacts
        uses: actions/upload-artifact@v4
        with:
          name: program-so
          path: |
            target/deploy/kassandra_program.so
            target/deploy/kassandra_market_program.so
          if-no-files-found: error
          retention-days: 1

  rust:
    name: Rust · program + runner + sdk-rs
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2

      - name: Download program artifact
        uses: actions/download-artifact@v4
        with:
          name: program-so
          path: target/deploy

      # The program's LiteSVM tests `include_bytes!` the .so at COMPILE time, so it
      # must exist at target/deploy/ before `cargo test` builds the test binaries.
      - name: Run workspace tests
        run: cargo test --workspace

  js:
    name: TS · build · typecheck · lint · unit
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Download program artifact
        uses: actions/download-artifact@v4
        with:
          name: program-so
          path: target/deploy

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Both SDKs are consumed by the app via their built dist/ (package `exports`),
      # so they must be built before the app typechecks / tests.
      - name: Build SDKs (oracle + market)
        run: |
          pnpm --filter ./sdk build
          pnpm --filter ./sdk-market build

      - name: SDK tests (litesvm + decoders)
        # The market SDK's litesvm suite crashes (napi bad_alloc) on hosted linux,
        # so it self-skips under SKIP_LITESVM (mirrors the kassandra-market CI).
        run: |
          pnpm --filter ./sdk test
          SKIP_LITESVM=1 pnpm --filter ./sdk-market test

      - name: SDK typecheck
        run: |
          pnpm --filter ./sdk typecheck
          pnpm --filter ./sdk-market typecheck

      - name: App typecheck
        run: pnpm --filter ./app typecheck

      - name: App lint
        run: pnpm --filter ./app lint

      - name: App unit tests
        run: pnpm --filter ./app test

  runner-e2e:
    name: E2E · real runner + mock Anthropic (offline)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # The debug binary the test spawns (`kassandra-runner run --config …`).
      - name: Build runner binary
        run: cargo build -p kassandra-runner

      # Drives the REAL AnthropicProvider HTTP+parse path against a local mock
      # server — no ANTHROPIC_API_KEY, no network. Asserts the mock's option flows
      # through to a genuine 97-byte claim payload, plus the refusal arm.
      - name: Run real-runner e2e (mock provider)
        run: pnpm --filter ./sdk exec vitest run test/surfpool/runner-mock-anthropic.test.ts
        env:
          KASSANDRA_E2E: "1"

  e2e:
    name: E2E · surfpool + Playwright (browser)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      # surfpool (the local Solana simnet the e2e harness boots). Pinned to the
      # GitHub release the harness was validated against (see NOTES-surfpool.md).
      # The snap `latest` channel is stale — it serves 0.9.5, whose `--version`
      # even exits non-zero, and it predates the 1.0.0 boot behavior the harness
      # relies on. Bump SURFPOOL_VERSION deliberately, re-checking the harness.
      - name: Install surfpool
        env:
          SURFPOOL_VERSION: v1.0.0
        run: |
          curl -fsSL "https://github.com/txtx/surfpool/releases/download/${SURFPOOL_VERSION}/surfpool-linux-x64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin surfpool
          sudo chmod +x /usr/local/bin/surfpool
          surfpool --version

      - name: Download program artifact
        uses: actions/download-artifact@v4
        with:
          name: program-so
          path: target/deploy

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # globalSetup seeds AI claims by running the REAL runner binary against a mock
      # Anthropic server (no fabricated hashes), so it must be built first.
      - name: Build runner binary
        run: cargo build -p kassandra-runner

      - name: Build SDKs (oracle + market)
        # The app dev server resolves BOTH `@kassandra/sdk` and the market
        # `@kassandra-market/sdk` (its `exports` point at `dist/`), so the Markets
        # pages need the market SDK built too — else Vite fails to resolve it.
        run: |
          pnpm --filter ./sdk build
          pnpm --filter ./sdk-market build

      - name: Install Playwright Chromium
        run: pnpm --filter ./app exec playwright install --with-deps chromium

      - name: Run browser E2E (local simnet)
        run: pnpm --filter ./app exec playwright test
        env:
          SURFPOOL_BIN: /usr/local/bin/surfpool

  db-it:
    name: Indexer · Postgres integration
    runs-on: ubuntu-latest
    # The db-layer tests run the REAL Postgres-specific SQL (JSONB, ANY($1) arrays,
    # $N placeholders, ON CONFLICT … EXCLUDED) against a throwaway Postgres service —
    # a SQLite stand-in would exercise a rewritten query. They self-skip everywhere
    # else (no TEST_DATABASE_URL), so this is the only job that needs a database.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2

      # Compiles only the indexer (no .so needed); the db integration test runs
      # against the service Postgres, every other indexer test runs as usual.
      - name: Indexer tests against real Postgres
        run: cargo test -p kassandra-indexer
        env:
          TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres
