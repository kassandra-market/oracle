# Kassandra CI — run the full test suite on every pull request (and on master).
#
# Three lanes, all triggered on PRs:
#   rust — build the SBF program (.so) then `cargo test` the whole workspace
#          (program LiteSVM tests + runner + sdk-rs). The program tests
#          `include_bytes!` the freshly built .so, so the build MUST precede them.
#   js   — build the SDK, then typecheck + lint + run every vitest suite (sdk & app).
#          The surfpool-gated integration tests self-skip when no local validator
#          is present (`describe.skipIf`), so this lane is deterministic.
#   e2e  — boot a local surfpool validator and drive the real dApp in a headless
#          browser (the non-forked Playwright suite). This exercises the write /
#          crank / claim / settle / admin flows end to end against the program.
#
# The mainnet-FORKED challenge-market Playwright project (playwright.fork.config.ts)
# and the network-dependent SDK surfpool suites are intentionally NOT run here —
# they need live mainnet RPC access and are flaky on hosted runners; run them
# locally via scripts/e2e-playwright-fork.sh / `pnpm --filter sdk test:e2e`.

name: CI

on:
  pull_request:
  push:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # Pin the Anza (Agave) toolchain that builds the SBF program locally, for
  # reproducible `cargo build-sbf`.
  SOLANA_VERSION: v3.1.7

jobs:
  rust:
    name: Rust · program + runner + sdk-rs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2

      - name: Cache Solana toolchain
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/share/solana
            ~/.cache/solana
          key: solana-${{ env.SOLANA_VERSION }}-${{ runner.os }}

      - name: Install Solana (Anza) toolchain
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/${SOLANA_VERSION}/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"

      - name: Build SBF program (.so)
        run: cargo build-sbf --manifest-path programs/kassandra/Cargo.toml

      - name: Run workspace tests
        run: cargo test --workspace

  js:
    name: TS · build · typecheck · lint · unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # The SDK is consumed by the app via its built dist/ (package `exports`), so
      # it must be built before the app typechecks / tests.
      - name: Build SDK
        run: pnpm --filter sdk build

      - name: SDK unit tests
        run: pnpm --filter sdk test

      - name: SDK typecheck
        run: pnpm --filter sdk typecheck

      - name: App typecheck
        run: pnpm --filter app typecheck

      - name: App lint
        run: pnpm --filter app lint

      - name: App unit tests
        run: pnpm --filter app test

  e2e:
    name: E2E · surfpool + Playwright (browser)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Cache Solana toolchain
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/share/solana
            ~/.cache/solana
          key: solana-${{ env.SOLANA_VERSION }}-${{ runner.os }}

      - name: Install Solana (Anza) toolchain
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/${SOLANA_VERSION}/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"

      # surfpool (the local Solana simnet the e2e harness boots) — published to the
      # snap store by txtx. If the channel changes, swap this for the installer at
      # https://surfpool.run or a github.com/txtx/surfpool release download.
      - name: Install surfpool
        run: |
          # Cover both snap confinement modes (strict / classic).
          sudo snap install surfpool || sudo snap install surfpool --classic
          surfpool --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build SBF program (.so)
        run: cargo build-sbf --manifest-path programs/kassandra/Cargo.toml

      - name: Build SDK
        run: pnpm --filter sdk build

      - name: Install Playwright Chromium
        run: pnpm --filter app exec playwright install --with-deps chromium

      - name: Run browser E2E (local simnet)
        run: pnpm --filter app exec playwright test
        env:
          SURFPOOL_BIN: /snap/bin/surfpool
