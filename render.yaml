# Render Blueprint — deploy the Kassandra dApp (app/) as a static site.
#
# The app is a Vite + React SPA that talks directly to a Solana RPC from the
# browser (no backend). This blueprint builds it from the pnpm monorepo and
# serves the static `app/dist` bundle from Render's global CDN.
#
# DEPLOY
#   1. Push this file to the repo's default branch.
#   2. Render Dashboard → New → Blueprint → pick this repo. Render reads render.yaml
#      and provisions the `kassandra-app` static site.
#   3. (Optional) set VITE_RPC_URL — see the env var note below.
#
# The site auto-deploys on every push to `master` that touches app/**, sdk/**, or
# the lockfile (see buildFilter). Pull requests get an ephemeral preview URL.
#
# It also provisions the Kassandra INDEXER — a Rust (Carbon) service that crawls
# the program's transactions into Postgres and exposes a read API. The crawler
# resumes from a durable cursor, so it catches up on anything missed during
# downtime. Set its RPC_URL after the first deploy.
#
# Docs: https://render.com/docs/blueprint-spec  ·  https://render.com/docs/static-sites

databases:
  - name: kassandra-indexer-db
    plan: free
    postgresMajorVersion: "16"

services:
  - type: web
    name: kassandra-app
    runtime: static
    # Rebuild only when the app, the SDK it bundles, the lockfile, or this file
    # change — not on unrelated program/runner/docs commits.
    buildFilter:
      paths:
        - app/**
        - sdk/**
        - pnpm-lock.yaml
        - render.yaml
    # Pin pnpm via corepack (the lockfile is v9 → pnpm 10), install the workspace,
    # build the SDK (the app bundles its dist/) then the app. `pnpm --filter app
    # build` runs `tsc -b && vite build && verify-css`.
    buildCommand: >-
      corepack enable &&
      corepack prepare pnpm@10.28.1 --activate &&
      pnpm install --frozen-lockfile &&
      pnpm --filter sdk build &&
      pnpm --filter app build
    staticPublishPath: app/dist
    pullRequestPreviewsEnabled: true
    # SPA fallback: React Router owns client-side routes, so every unmatched path
    # must serve index.html (a hard refresh on /oracles/… should not 404).
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    # Vite fingerprints asset filenames, so they are safe to cache forever.
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    envVars:
      - key: NODE_VERSION
        value: "20"
      # OPTIONAL build-time override for the "Localnet" cluster's RPC endpoint
      # (Vite inlines VITE_* at build time). Leave unset to ship the built-in
      # Devnet / Mainnet endpoints the in-app cluster switcher already offers;
      # set it to your own RPC URL to point "Localnet" at a custom validator.
      - key: VITE_RPC_URL
        sync: false

  # ---- Indexer: Carbon RPC-crawler → Postgres, with a read API ----
  - type: web
    name: kassandra-indexer
    runtime: rust
    # The indexer is a self-contained Cargo crate (its own lockfile), so Render
    # builds only it — it does NOT pull in the program's pinned Solana workspace.
    rootDir: indexer
    plan: free
    buildFilter:
      paths:
        - indexer/**
        - render.yaml
    buildCommand: cargo build --release --locked
    startCommand: ./target/release/kassandra-indexer
    healthCheckPath: /health
    envVars:
      # Managed Postgres connection string, injected by Render.
      - key: DATABASE_URL
        fromDatabase:
          name: kassandra-indexer-db
          property: connectionString
      # The Solana RPC to crawl (a mainnet/devnet endpoint). Set after first deploy.
      - key: RPC_URL
        sync: false
      - key: COMMITMENT
        value: finalized
      - key: POLL_INTERVAL_MS
        value: "10000"
      - key: PROMOTE_INTERVAL_MS
        value: "30000"
      - key: RUST_LOG
        value: info
      # Optional: pin the initial backfill to a known signature by pre-seeding the
      # indexer_cursor row; otherwise the first run backfills the full history.
