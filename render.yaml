# Render Blueprint — the Kassandra dApp + a single PRIVATE indexer backend.
#
# ARCHITECTURE
#   kassandra-app       (public web service, Node) — serves the Vite SPA (both the
#                       oracle `/oracles*` and market `/markets*` sections) AND
#                       reverse-proxies BOTH `/indexer/*` (oracle read API + `/rpc`
#                       gateway) and `/api/*` (market data + tx gateway) to the
#                       single indexer over Render's private network. This is the
#                       ONLY thing that can reach the indexer.
#   kassandra-indexer   (PRIVATE service, Rust/Carbon) — ONE binary running two
#                       Carbon pipelines into ONE Postgres: the oracle side crawls
#                       transactions into an `events` log (resuming from a durable
#                       cursor); the market side indexes the market program's
#                       accounts (gpa + programSubscribe) into `market_accounts`.
#                       Serves both API surfaces. NO public URL.
#   kassandra-indexer-db (managed Postgres) — persists both.
#
# DEPLOY: push to the default branch, then Render Dashboard → New → Blueprint →
# this repo. After the first deploy, set the `kassandra-solana-rpc` group secrets.
#
# Docs: https://render.com/docs/blueprint-spec

# Solana RPC secrets, set ONCE and shared by every service that needs chain access.
# After the first deploy, fill these in the Dashboard (all `sync: false`):
#   SOLANA_RPC_URL / RPC_URL → the same mainnet HTTP endpoint
#   SOLANA_WS_URL            → the mainnet ws endpoint (market live programSubscribe)
envVarGroups:
  - name: kassandra-solana-rpc
    envVars:
      - key: SOLANA_RPC_URL
        sync: false
      - key: SOLANA_WS_URL
        sync: false
      # Distinct key only because the oracle crawler code reads `RPC_URL`; set it
      # to the SAME value as SOLANA_RPC_URL.
      - key: RPC_URL
        sync: false

databases:
  - name: kassandra-indexer-db
    plan: free
    postgresMajorVersion: "16"

services:
  # ---- App: public Node web service (SPA + private-indexer proxy for both APIs) ----
  - type: web
    name: kassandra-app
    runtime: node
    plan: free
    buildFilter:
      paths:
        - app/**
        - sdk/**
        - sdk-market/**
        - pnpm-lock.yaml
        - render.yaml
    # Pin pnpm via corepack, install the workspace, build BOTH SDKs (the app
    # bundles both dist/) then the app.
    buildCommand: >-
      corepack enable &&
      corepack prepare pnpm@10.28.1 --activate &&
      pnpm install --frozen-lockfile &&
      pnpm --filter ./sdk build &&
      pnpm --filter ./sdk-market build &&
      pnpm --filter ./app build
    # Serve dist/ + proxy /indexer/* AND /api/* to the private indexer (app/server.mjs).
    startCommand: node app/server.mjs
    healthCheckPath: /
    previews:
      generation: automatic
    envVars:
      - key: NODE_VERSION
        value: "20"
      # No VITE_RPC_URL: unset → the oracle side runs in GATEWAY mode (all chain
      # work over same-origin /indexer/rpc). Cluster label is for explorer links only.
      - key: VITE_CLUSTER
        value: mainnet-beta
      # Oracle event-indexer base (same-origin; the server proxies /indexer/* → indexer).
      - key: VITE_INDEXER_URL
        value: /indexer
      # Canonical PUBLIC origin baked into each oracle's on-chain metadata `uri`
      # (`${VITE_APP_ORIGIN}/api/oracle/{oracle}/metadata.json`). It is committed
      # IMMUTABLY on-chain, so it must be the stable public URL — set it to this
      # app's canonical origin (e.g. https://kassandra-app.onrender.com or your
      # custom domain) after the first deploy. Unset → falls back to the browser's
      # runtime origin (fine for dev only). Build-time (Vite bakes it into the bundle).
      - key: VITE_APP_ORIGIN
        sync: false
      # The private indexer's internal address, injected by Render — the app
      # server's proxy target for BOTH /indexer/* and /api/*.
      - key: INDEXER_HOST
        fromService:
          type: pserv
          name: kassandra-indexer
          property: host
      - key: INDEXER_PORT
        fromService:
          type: pserv
          name: kassandra-indexer
          property: port

  # ---- Indexer: PRIVATE, ONE binary → Postgres, serving both API surfaces ----
  - type: pserv
    name: kassandra-indexer
    runtime: rust
    # Workspace member (single lockfile) — `-p` compiles only this package + its
    # deps (kassandra-oracles-sdk, kassandra-program, kassandra-market-program), not
    # the test/runner crates. Private services can't use the free plan.
    plan: starter
    buildFilter:
      paths:
        - indexer/**
        - sdks/oracles/rust/**
        - programs/kassandra/**
        - programs/kassandra-market/**
        - Cargo.toml
        - Cargo.lock
        - render.yaml
    buildCommand: cargo build --release --locked -p kassandra-indexer
    startCommand: ./target/release/kassandra-indexer
    # pserv has no healthCheckPath; the indexer still serves /health.
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: kassandra-indexer-db
          property: connectionString
      # SOLANA_RPC_URL + SOLANA_WS_URL + RPC_URL — the oracle crawler + `/rpc`
      # gateway read RPC_URL/SOLANA_RPC_URL; the market gpa snapshot + live
      # programSubscribe tail read SOLANA_RPC_URL + SOLANA_WS_URL.
      - fromGroup: kassandra-solana-rpc
      - key: PORT
        value: "10000"
      # Oracle crawler cadence.
      - key: COMMITMENT
        value: finalized
      - key: POLL_INTERVAL_MS
        value: "10000"
      - key: PROMOTE_INTERVAL_MS
        value: "30000"
      # Autonomous metadata fetcher: how often to pull + hash-verify + index the
      # externally-hosted oracle-metadata JSON (any host, not just app POSTs).
      - key: METADATA_FETCH_INTERVAL_MS
        value: "30000"
      # Market program id (defaults to the known id in-code; pinned for clarity).
      - key: MARKET_PROGRAM_ID
        value: FEGNHWAB7kc7VC9CCwbvVPsv4Jykz2r2WQ758V4xCT9S
      # 0 => the market side uses the live ws programSubscribe tail (SOLANA_WS_URL
      # required). >0 would fall back to periodic getProgramAccounts polling.
      - key: INDEXER_RECONCILE_MS
        value: "0"
      - key: ALLOWED_ORIGIN
        value: "*"
      - key: RUST_LOG
        value: info
