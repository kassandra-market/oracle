# Render Blueprint — the Kassandra dApp + a PRIVATE indexer backend.
#
# ARCHITECTURE
#   kassandra-app       (public web service, Node) — serves the Vite SPA AND
#                       reverse-proxies /indexer/* to the indexer over Render's
#                       private network. This is the ONLY thing that can reach the
#                       indexer.
#   kassandra-indexer   (PRIVATE service, Rust/Carbon) — crawls the program's
#                       transactions into Postgres and serves a read API. It has
#                       NO public URL; only kassandra-app reaches it, at its
#                       internal host:port. The crawler resumes from a durable
#                       cursor, so it catches up on anything missed during downtime.
#   kassandra-indexer-db (managed Postgres).
#
# The app used to be a static CDN site that fetched the indexer straight from the
# browser — which forced the indexer to be public. Serving the app from a Node
# process instead lets the browser call the app's OWN origin (/indexer/...), which
# the server proxies internally, so the indexer can be locked down as private.
#
# DEPLOY: push to the default branch, then Render Dashboard → New → Blueprint →
# this repo. After the first deploy, set RPC_URL on the indexer.
#
# Docs: https://render.com/docs/blueprint-spec

databases:
  - name: kassandra-indexer-db
    plan: free
    postgresMajorVersion: "16"

services:
  # ---- App: public Node web service (SPA + private-indexer proxy) ----
  - type: web
    name: kassandra-app
    runtime: node
    plan: free
    buildFilter:
      paths:
        - app/**
        - sdk/**
        - pnpm-lock.yaml
        - render.yaml
    # Pin pnpm via corepack (lockfile v9 → pnpm 10), install the workspace, build
    # the SDK (the app bundles its dist/) then the app.
    buildCommand: >-
      corepack enable &&
      corepack prepare pnpm@10.28.1 --activate &&
      pnpm install --frozen-lockfile &&
      pnpm --filter sdk build &&
      pnpm --filter app build
    # Serve dist/ + proxy /indexer/* to the private indexer (app/server.mjs).
    startCommand: node app/server.mjs
    healthCheckPath: /
    previews:
      generation: automatic
    envVars:
      - key: NODE_VERSION
        value: "20"
      # NOTE: no VITE_RPC_URL here on purpose. Unset → the app runs in GATEWAY
      # mode: it performs ALL chain work (reads, blockhash, sendRawTransaction)
      # against the SAME-ORIGIN /indexer/rpc path, which the server proxies to the
      # private backend. The real RPC endpoint never ships in the browser bundle.
      #
      # Cluster label for explorer links only (NOT an RPC URL): devnet | mainnet-beta.
      - key: VITE_CLUSTER
        value: mainnet-beta
      # The app calls the backend at its OWN origin under this prefix; the server
      # proxies it to the private indexer. Same-origin, so it is inlined at build.
      - key: VITE_INDEXER_URL
        value: /indexer
      # The private indexer's internal address, injected by Render — the app
      # server's proxy target. Not reachable from the public internet.
      - key: INDEXER_HOST
        fromService:
          type: pserv
          name: kassandra-indexer
          property: host
      - key: INDEXER_PORT
        fromService:
          type: pserv
          name: kassandra-indexer
          property: port

  # ---- Indexer: PRIVATE Carbon RPC-crawler → Postgres, read API ----
  - type: pserv
    name: kassandra-indexer
    runtime: rust
    # The indexer is a member of the repo-root Cargo workspace (single lockfile),
    # so it builds from the root with `-p` — `cargo build` only compiles this
    # package + its deps (kassandra-sdk → kassandra-program), not the test/runner
    # crates. Artifacts land in the workspace `target/`, hence no `rootDir`.
    # Private services can't use the free plan (Render restricts free to web
    # services + databases), so the indexer runs on the cheapest paid tier.
    plan: starter
    buildFilter:
      paths:
        - indexer/**
        - sdk-rs/**
        - programs/kassandra/**
        - Cargo.toml
        - Cargo.lock
        - render.yaml
    buildCommand: cargo build --release --locked -p kassandra-indexer
    startCommand: ./target/release/kassandra-indexer
    # NOTE: private services (pserv) don't support healthCheckPath — Render only
    # health-checks public web services. The indexer still serves /health; the
    # app-server proxy is what actually reaches it.
    envVars:
      # Managed Postgres connection string, injected by Render.
      - key: DATABASE_URL
        fromDatabase:
          name: kassandra-indexer-db
          property: connectionString
      # Solana RPC endpoint (`RPC_URL`) — pulled from the SHARED `kassandra-solana-rpc`
      # env group, which is DEFINED by the sibling kassandra-market Blueprint
      # (programs/kassandra-market/render.yaml) and referenced here so the mainnet
      # RPC endpoint is set ONCE and shared across both deploys. The group also
      # carries SOLANA_RPC_URL/SOLANA_WS_URL for that indexer; this crawler only
      # reads RPC_URL. Sync the kassandra-market Blueprint first (or pre-create the
      # group in the Dashboard) so this reference resolves.
      - fromGroup: kassandra-solana-rpc
      # Fixed internal port the indexer binds — the app proxy resolves it via the
      # `port` fromService property above.
      - key: PORT
        value: "10000"
      - key: COMMITMENT
        value: finalized
      - key: POLL_INTERVAL_MS
        value: "10000"
      - key: PROMOTE_INTERVAL_MS
        value: "30000"
      - key: RUST_LOG
        value: info
